server {
    listen 80;
    server_name paiban.lx05.art;

    # DNS Resolver for dynamic proxy_pass
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend Assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 1. Backend API Proxy
    location ~ ^/(api|webhook|sync-plugin)/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. WeChat Official API Proxy
    location /wechat-api/ {
        rewrite ^/wechat-api/(.*)$ /$1 break;
        proxy_pass https://api.weixin.qq.com;
        proxy_set_header Host api.weixin.qq.com;
        proxy_set_header Origin https://api.weixin.qq.com;
        proxy_ssl_server_name on;
    }

    # 3. WeChat Image Proxy (Anti-hotlinking Bypass)
    # URL format: /wechat-image-proxy/hostname/path
    location ~* ^/wechat-image-proxy/([^/]+)(/.*)$ {
        set $target_host $1;
        set $target_path $2;
        
        proxy_pass https://$target_host$target_path$is_args$args;
        proxy_set_header Host $target_host;
        proxy_set_header Referer "https://mp.weixin.qq.com";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36";
        
        proxy_ssl_server_name on;
        proxy_hide_header 'Referer';
        
        # Security headers for image proxy
        add_header Access-Control-Allow-Origin *;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

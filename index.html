<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>版式装配引擎 V1.0</title>
  <meta name="description" content="智能的文档排版和样式配置工具" />

  <!-- 关键资源预连接 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.weixin.qq.com" crossorigin />

  <!-- DNS 预获取 -->
  <link rel="dns-prefetch" href="//localhost:3001" />

  <!-- 关键 CSS 内联 -->
  <style>
    /* 防止 FOUC (Flash of Unstyled Content) */
    #app {
      min-height: 100vh;
      background-color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    /* 加载动画 */
    .initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .initial-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- 预加载关键资源 -->
  <link rel="modulepreload" href="/src/main.js" />
  <link rel="preload" href="/src/styles/main.css" as="style" />

  <!-- 非关键 CSS 延迟加载 -->
  <link rel="preload" href="/src/styles/compatibility.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="/src/styles/compatibility.css" /></noscript>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="content-hidden">
  <!-- 初始加载动画 -->
  <div id="initial-loader" class="initial-loader">
    <div class="loader-spinner"></div>
  </div>

  <!-- Vue 应用挂载点 -->
  <div id="app"></div>

  <!-- 主脚本 -->
  <script type="module" src="/src/main.js"></script>

  <!-- 隐藏加载动画 -->
  <script>
    window.addEventListener('load', function() {
      // 最小显示时间 500ms，避免闪烁
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(() => {
            loader.remove();
          }, 300);
        }
      }, 500);
    });

    // 错误处理
    window.addEventListener('error', function(e) {
      console.error('Application error:', e.error);
    });

    // 性能监控
    window.addEventListener('load', function() {
      if ('performance' in window && 'getEntriesByType' in performance) {
        const navTiming = performance.getEntriesByType('navigation')[0];
        console.log('Page Load Time:', navTiming.loadEventEnd - navTiming.loadEventStart, 'ms');
      }
    });
  </script>
</body>
</html>

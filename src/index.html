<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="版式装配引擎 - 专业的文档排版和样式装饰工具">
  <meta name="keywords" content="排版,装饰,样式,文档,135编辑器">
  <title>版式装配引擎 V1.0</title>

  <!-- CSP 安全头 - 允许模块脚本 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' http://localhost:1921 http://localhost:*; style-src 'self' 'unsafe-inline' http://localhost:1921; img-src 'self' data: https: http://localhost:1921 http://localhost:3001 http://localhost:*; font-src 'self' data:; connect-src 'self' https: http://localhost:* ws://localhost:* ws://localhost:1921; media-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self';">

  <!-- 预连接到关键域名 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- 移除 Google Fonts 连接 - 使用系统字体提升性能 -->

  <!-- DNS 预取 -->
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="//mmbiz.qpic.cn">

  <!-- PWA相关 -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="msapplication-TileColor" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="版式装配引擎">

  <!-- 关键 CSS 内联 - 消除渲染阻塞 -->
  <style>
    *,*:before,*:after{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9fafb}
    #app{min-height:100vh;background:#f9fafb}
    .app-container{opacity:0;transition:opacity .2s ease-out}
    .app-container.loaded{opacity:1}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* 加载指示器样式 - 内联以避免渲染阻塞 */
    #initial-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#f9fafb;display:flex;align-items:center;justify-content:center;z-index:9999}
    .loader-content{text-align:center}
    .loader-spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top:4px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
    .loader-text{color:#6b7280;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;font-size:14px}
    .loader-hiding{opacity:0;transition:opacity .3s ease}
  </style>

  <!-- 预加载关键资源 -->
  <link rel="modulepreload" href="/src/main.ts">
</head>

<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>

  <!-- 加载指示器 - 移除内联样式 -->
  <div id="initial-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p class="loader-text">正在加载版式装配引擎...</p>
    </div>
  </div>

  <!-- 引入外部JS文件而不是内联脚本 -->
  <script type="module" src="./scripts/loader.js"></script>
</body>

</html>

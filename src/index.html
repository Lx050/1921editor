<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="版式装配引擎 - 专业的文档排版和样式装饰工具">
  <meta name="keywords" content="排版,装饰,样式,文档,135编辑器">
  <title>版式装配引擎 V1.0</title>

  <!-- 预加载关键资源 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- 性能优化 -->
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">

  <!-- PWA相关 -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="msapplication-TileColor" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="版式装配引擎">

  <!-- 引入外部CSS文件而不是内联样式 -->
  <link rel="stylesheet" href="./styles/loader.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>

  <!-- 加载指示器 - 移除内联样式 -->
  <div id="initial-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p class="loader-text">正在加载版式装配引擎...</p>
    </div>
  </div>

  <!-- 引入外部JS文件而不是内联脚本 -->
  <script type="module" src="./scripts/loader.js"></script>
</body>
</html>

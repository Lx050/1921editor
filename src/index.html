<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="我的排版助手 - 个人文章排版与美化工具">
  <meta name="keywords" content="排版,文章,个人创作,美化">
  <title>我的排版助手</title>

  <!-- 预加载关键资源 -->
  <!-- 移除 Google Fonts（在中国被阻止导致页面卡住） -->

  <!-- 性能优化 -->
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">

  <!-- PWA相关 -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="msapplication-TileColor" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="我的排版助手">

  <!-- 引入外部CSS文件而不是内联样式 -->
  <link rel="stylesheet" href="./styles/loader.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>

  <!-- 加载指示器 - 移除内联样式 -->
  <div id="initial-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p class="loader-text">正在加载...</p>
    </div>
  </div>

  <!-- 引入外部JS文件而不是内联脚本 -->
  <script type="module" src="./scripts/loader.js"></script>
</body>
</html>

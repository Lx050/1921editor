name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 跳过 setup-node：服务器已安装 Node.js v22
      # 直接使用系统 Node，避免国内服务器从 GitHub 下载慢的问题
      - name: Verify Node.js
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      # 前端：将构建产物部署到 Nginx 静态目录
      - name: Deploy frontend
        run: |
          DEPLOY_DIR="/var/www/1921editor"
          sudo mkdir -p "$DEPLOY_DIR"
          sudo rsync -av --delete src/dist/ "$DEPLOY_DIR/"
          echo "✅ Frontend deployed to $DEPLOY_DIR"

name: Deploy to Server

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # 1. 部署前端静态文件到 Nginx 目录
      - name: Deploy Frontend to Nginx
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "src/dist/"
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/var/www/1921editor"

      # 2. 部署后端代码及配置文件到 /opt 目录
      - name: Deploy Backend & Docker Config
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-avz"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/opt/1921editor"
          EXCLUDE: "/node_modules/,/src/dist/,/.git/,/content-backend/node_modules/,/content-backend/dist/"

      # 3. 自动化配置 Nginx 并重启后端服务
      - name: Post-deployment Tasks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 重建 .env 环境变量文件
            echo "${{ secrets.ENV_FILE }}" > /opt/1921editor/.env

            # 2. 安装 certbot（如果尚未安装）
            if ! command -v certbot &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq certbot python3-certbot-nginx
            fi

            # 3. 申请/更新 SSL 证书（仅在证书不存在时申请）
            mkdir -p /var/www/certbot
            if [ ! -f /etc/letsencrypt/live/paiban.lx05.art/fullchain.pem ]; then
              # 先用 HTTP-only 配置启动 nginx 以完成 ACME challenge
              echo 'server { listen 80; server_name paiban.lx05.art; root /var/www/certbot; location /.well-known/acme-challenge/ { root /var/www/certbot; } }' > /etc/nginx/conf.d/1921editor.conf
              nginx -t && systemctl reload nginx
              certbot certonly --webroot -w /var/www/certbot -d paiban.lx05.art --non-interactive --agree-tos -m lx.0506@outlook.com
            fi

            # 4. 设置完整 Nginx 配置（含 HTTPS）
            cp /opt/1921editor/scripts/nginx.conf /etc/nginx/conf.d/1921editor.conf
            nginx -t && systemctl reload nginx

            # 5. 确保上传目录权限
            mkdir -p /opt/1921editor/content-backend/uploads
            chmod -R 777 /opt/1921editor/content-backend/uploads

            # 6. 重启 Docker 服务
            cd /opt/1921editor
            docker compose down backend || true
            docker compose up -d --build backend

            # 7. 设置证书自动续期
            (crontab -l 2>/dev/null | grep -q 'certbot renew') || (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet && systemctl reload nginx") | crontab -

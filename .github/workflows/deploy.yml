name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用系统已安装的 Node.js v22，无需 setup-node
      - name: Verify Node.js
        run: |
          /usr/bin/node -v
          /usr/bin/npm -v

      - name: Install dependencies
        run: /usr/bin/npm ci

      - name: Build frontend
        run: /usr/bin/npm run build

      # 前端：将构建产物部署到 Nginx 静态目录
      # 目录已 chown 给 github-runner，无需 sudo
      - name: Deploy frontend
        run: |
          DEPLOY_DIR="/var/www/1921editor"
          mkdir -p "$DEPLOY_DIR"
          rsync -av --delete src/dist/ "$DEPLOY_DIR/"
          echo "✅ Frontend deployed to $DEPLOY_DIR"

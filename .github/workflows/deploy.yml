name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      - name: Deploy to web directory
        run: |
          # 将构建产物同步到 Nginx 站点目录（按需修改路径）
          DEPLOY_DIR="/var/www/1921editor"
          sudo mkdir -p "$DEPLOY_DIR"
          sudo rsync -av --delete src/dist/ "$DEPLOY_DIR/"
          echo "Deployed to $DEPLOY_DIR"

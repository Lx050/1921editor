name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      # 前端：将构建产物部署到 Nginx 静态目录
      - name: Deploy frontend
        run: |
          DEPLOY_DIR="/var/www/1921editor"
          sudo mkdir -p "$DEPLOY_DIR"
          sudo rsync -av --delete src/dist/ "$DEPLOY_DIR/"
          echo "✅ Frontend deployed to $DEPLOY_DIR"

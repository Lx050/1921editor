version: '3.8'

services:
  # Frontend Service (Vue 3 + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:1922:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

  # Backend Service (NestJS)
  backend:
    build:
      context: ./content-backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./content-backend/uploads:/app/uploads
      - ./content-backend/logs:/app/logs
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    env_file:
      - ./.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
